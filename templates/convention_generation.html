{% extends "base.html" %}

{% block content %}
<h2>Emprunt du matériel</h2>

<style>
    form label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    form input[type="text"],
    form textarea {
        display: block;
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    form textarea {
        resize: vertical;
        min-height: 80px;
    }

    form button {
        margin-top: 20px;
    }
</style>

<form action="{{ url_for('generation_convention') }}" method="post">

    <label for="nom">Nom de l'étudiant :</label>
    <input type="text" id="nom" name="nom" autocomplete="off" required>
    <ul id="nom-results" class="dropdown"></ul>

    <label for="prenom">Prénom de l'étudiant :</label>
    <input type="text" id="prenom" name="prenom" autocomplete="off" required>
    <ul id="prenom-results" class="dropdown"></ul> 
 

    <label for="observation">Observation lors de l'emprunt :</label>
    <textarea id="observation" name="observation"></textarea> 

    <button type="submit">Valider</button>
</form>

<a href="{{ url_for('index') }}">Retour à l'accueil</a>

<script src="{{ url_for('static', filename='js/autocomplete.js') }}"></script>    <label for="observation">Observation lors de l'emprunt :</label>

{% endblock %}
