{% block content %}
<div class="parametres-container">
    <div style="margin-bottom: 20px;">
        <a href="{{ url_for('index') }}" class="btn-retour">Retour à l'accueil</a>
    </div>
    
    <h1>Paramètres du système</h1>

    <div class="parametres-grid">
        <div class="param-card">
            <h3>Comptes Administrateurs</h3>
            <p>Ajouter un nouvel utilisateur avec tout les droits.</p>
            <a href="{{ url_for('create_admin') }}" class="btn-action">Créer un admin</a>
        </div>

        <div class="param-card">
	    <h3>Temps d'inactivité</h3>
	    <p>Limite actuelle : <strong>{{ current_minutes }} minutes</strong> d'inactivité.</p>
	    
	    <form action="{{ url_for('modifier_timeout') }}" method="POST" style="margin-top: 15px;">
		<div style="margin-bottom: 10px;">
		    <label for="minutes" style="display: block; margin-bottom: 5px;">Nouvelle durée (en min) :</label>
		    <input type="number" id="minutes" name="minutes" value="{{ current_minutes }}" min="1" required 
		           style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box;">
		</div>
		<button type="submit" class="btn-action" style="width: 100%; padding: 8px; cursor: pointer;">Enregistrer la durée</button>
	    </form>
	</div>
    </div>
</div>
{% endblock %}
